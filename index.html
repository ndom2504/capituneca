
<!DOCTYPE html>
<html lang="fr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPITUNE v3 - Excellence Immigration</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'cm-white': '#FFFFFF',
              'cm-black': '#1A1A1A',
              'cm-navy': '#26374A',
              'cm-blue-nav': '#284162',
              'cm-blue-hover': '#0535D2',
              'cm-error': '#D3080C',
              'cm-grey-fine': '#64748b',
              'cm-gold': '#C5A059',
              'cm-purple': '#7C3AED',
              'cm-purple-light': '#F5F3FF',
            },
            fontFamily: {
              inter: ['Inter', 'sans-serif'],
            },
            boxShadow: {
              'glow-purple': '0 0 20px -5px rgba(124, 58, 237, 0.3)',
              'glow-gold': '0 0 20px -5px rgba(197, 160, 89, 0.3)',
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fbfcfd;
            color: #1A1A1A;
            letter-spacing: -0.01em;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Arrière-plan "Vivifiant" (Mesh Gradient) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(124, 58, 237, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(5, 53, 210, 0.02) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(197, 160, 89, 0.03) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(124, 58, 237, 0.02) 0px, transparent 50%);
        }

        .text-fine-grey {
            font-weight: 300;
            color: #64748b;
        }

        .link-nav {
            color: #284162;
            transition: color 0.2s ease;
        }
        .link-nav:hover {
            color: #0535D2;
        }

        /* Glassmorphism subtle effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Styles d'arrière-plan pour la page d'authentification */
        .auth-page-bg {
            background-color: #FFFFFF;
            background-image: linear-gradient(rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.94)), 
                              url('https://images.unsplash.com/photo-1434064511983-18c6dae20ed5?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        ::-webkit-scrollbar {
          width: 5px;
        }
        ::-webkit-scrollbar-track {
          background: transparent;
        }
        ::-webkit-scrollbar-thumb {
          background: #e2e8f0;
          border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
          background: #7C3AED;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
    "firebase/": "https://esm.sh/firebase@^12.9.0/"
  }
}
</script>
</head>
<body class="antialiased">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
